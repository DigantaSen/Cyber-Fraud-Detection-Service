global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    platform: fraud-detection

scrape_configs:
  # ── OTel Collector (receives metrics from all services) ───
  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8889']

  # ── Kafka (JMX metrics via Kafka exporter) ───────────────
  # Uncomment if kafka-exporter is added
  # - job_name: kafka
  #   static_configs:
  #     - targets: ['kafka-exporter:9308']

  # ── PgBouncer ────────────────────────────────────────────
  # Uncomment if pgbouncer_exporter is added
  # - job_name: pgbouncer
  #   static_configs:
  #     - targets: ['pgbouncer-exporter:9127']

  # ── Platform Backend Services ─────────────────────────────
  # Each FastAPI service exposes GET /metrics (prometheus-fastapi-instrumentator)
  - job_name: platform-services
    metrics_path: /metrics
    static_configs:
      - targets:
          - 'auth:8000'
          - 'case:8000'
          - 'evidence:8000'
          - 'notification:8000'
          - 'reporting:8000'
          - 'geospatial:8000'
          - 'graph:8000'
          - 'bot:8000'
          - 'citizen-bff:8000'
          - 'investigator-bff:8000'
          - 'inference-orchestrator:8000'
          - 'audit:8000'
          - 'event-processing:8000'
          - 'search:8000'
        labels:
          environment: local

  # ── Kong Gateway ──────────────────────────────────────────
  - job_name: kong
    static_configs:
      - targets: ['kong:8001']
    metrics_path: /metrics

  # ── Prometheus self-monitoring ────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
