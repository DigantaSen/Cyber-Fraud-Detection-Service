  # ──────────────────────────────────────────────────────────
  # Kong — API Gateway (DB-less Declarative Mode)
  # JWT validation, rate limiting, correlation-id on every route
  # ──────────────────────────────────────────────────────────
  kong:
    image: kong:3
    container_name: platform-kong
    restart: unless-stopped
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_PROXY_LISTEN: "0.0.0.0:8000, 0.0.0.0:8443 ssl"
      KONG_PLUGINS: "bundled"
      KONG_VAULT_ENV_REDIS_PASSWORD: ${REDIS_PASSWORD:-change_me_redis}
    volumes:
      - ./infra/kong/kong.yml:/etc/kong/kong.yml:ro
    ports:
      - "8000:8000"   # HTTP proxy (client → Kong → services)
      - "8001:8001"   # Admin API
      - "8443:8443"   # HTTPS proxy
    networks:
      - platform-net
    depends_on:
      redis:
        condition: service_healthy
      tempo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kong health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ══════════════════════════════════════════════════════════
  # OBSERVABILITY STACK (Prometheus + Grafana + Loki + Tempo)
  # Shows metrics, logs, and distributed traces in one place
  # ══════════════════════════════════════════════════════════

  # ── Prometheus ───────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: platform-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
      - '--web.enable-remote-write-receiver'
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - platform-net
    healthcheck:
      test: ["CMD-SHELL", "wget -O /dev/null -q http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Grafana ───────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: platform-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    networks:
      - platform-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health | grep -q 'ok'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Loki (log aggregation) ────────────────────────────────
  loki:
    image: grafana/loki:3.0.0
    container_name: platform-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./infra/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    networks:
      - platform-net
    healthcheck:
      test: ["CMD-SHELL", "wget -O /dev/null -q http://localhost:3100/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Tempo (distributed tracing) ───────────────────────────
  # Services send OTLP traces directly here (port 4317/4318)
  tempo:
    image: grafana/tempo:2.4.0
    container_name: platform-tempo
    restart: unless-stopped
    command: -config.file=/etc/tempo/tempo-config.yml
    volumes:
      - ./infra/tempo/tempo-config.yml:/etc/tempo/tempo-config.yml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"   # Tempo HTTP (Grafana data source)
      - "4317:4317"   # OTLP gRPC — services send traces here
      - "4318:4318"   # OTLP HTTP — services send traces here
    networks:
      - platform-net
    healthcheck:
      test: ["CMD-SHELL", "wget -O /dev/null -q http://localhost:3200/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
